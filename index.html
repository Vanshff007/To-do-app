<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080c18" />
  <meta name="description" content="TaskFlow — A premium dark-mode task management app" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>TaskFlow</title>

  <!-- Favicon (inline SVG as data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234f8ef7'/><path d='M8 16l5 5 11-11' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />

  <!-- Stylesheets — ORDER MATTERS -->
  <link rel="stylesheet" href="src/styles/variables.css" />
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/components.css" />
  <link rel="stylesheet" href="src/styles/responsive.css" />
</head>
<body>
  <!-- App root -->
  <div id="app" role="main"></div>

  <!-- ============================================================
       JavaScript — load order is critical:
       utils first → components → screens → router → app bootstrap
       ============================================================ -->

  <!-- Utils layer -->
  <script src="src/utils/storage.js"></script>
  <script src="src/utils/helpers.js"></script>
  <script src="src/utils/taskStore.js"></script>

  <!-- Shared components -->
  <script src="src/components/Toast.js"></script>
  <script src="src/components/ConfirmDialog.js"></script>
  <script src="src/components/BottomNav.js"></script>
  <script src="src/components/TaskCard.js"></script>
  <script src="src/components/TaskModal.js"></script>
  <script src="src/components/FAB.js"></script>

  <!-- Screens -->
  <script src="src/screens/DashboardScreen.js"></script>
  <script src="src/screens/TasksScreen.js"></script>
  <script src="src/screens/CalendarScreen.js"></script>
  <script src="src/screens/StatsScreen.js"></script>

  <!-- Router -->
  <script src="src/utils/router.js"></script>

  <!-- App bootstrap (last) -->
  <script src="src/app.js"></script>
</body>
</html>
